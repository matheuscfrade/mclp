name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Python Backend
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Git LFS files are required for data checks
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project (dev)
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check .

      - name: Verify imports and data script
        run: |
          python -c "import config, data_loader, core.instance; print('Core imports OK')"
          python scripts/ensure_data.py --check-only --quiet || echo "Data check returned non-zero (expected in fresh CI without full LFS objects sometimes)"

      - name: Run a minimal health check of the API module
        run: |
          python -c "
          from api.main import app
          print('FastAPI app loaded successfully')
          "

  frontend:
    name: Frontend Build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies (matching project convention)
        working-directory: web
        shell: pwsh
        run: |
          $installRoot = Join-Path $env:USERPROFILE ".mclp-web"
          New-Item -ItemType Directory -Force -Path $installRoot | Out-Null
          Copy-Item package.json $installRoot -Force
          npm install --prefix $installRoot --loglevel=error

      - name: Build frontend
        working-directory: web
        shell: pwsh
        run: |
          $env:MCLP_NODE_MODULES = Join-Path $env:USERPROFILE ".mclp-web\node_modules"
          $vite = Join-Path $env:MCLP_NODE_MODULES ".bin\vite.cmd"

          # Build exactly as done in build.ps1 (Vite handles TypeScript)
          & $vite build --config (Join-Path (Get-Location) "vite.config.ts")

      - name: Upload build artifact (optional)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: web-dist
          path: web/dist/
          retention-days: 7
